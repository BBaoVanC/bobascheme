[colors]
foreground=$HEX__FG
background=$HEX__BG

## Normal/regular colors (color palette 0-7)
regular0=$HEX__BLACK
regular1=$HEX__RED
regular2=$HEX__GREEN
regular3=$HEX__YELLOW
regular4=$HEX__BLUE
regular5=$HEX__MAGENTA
regular6=$HEX__CYAN
regular7=$HEX__WHITE

## Bright colors (color palette 8-15)
bright0=$HEX__FORE_BLACK
bright1=$HEX__FORE_RED
bright2=$HEX__FORE_GREEN
bright3=$HEX__FORE_YELLOW
bright4=$HEX__FORE_BLUE
bright5=$HEX__FORE_MAGENTA
bright6=$HEX__FORE_CYAN
bright7=$HEX__FORE_WHITE

## dimmed colors (see foot.ini(5) man page)
# dim0=<not set>
# ...
# dim7=<not-set>

## The remaining 256-color palette
# 16 = <256-color palette #16>
# ...
# 255 = <256-color palette #255>

## Misc colors
selection-foreground=e9e9e9
selection-background=414141
jump-labels=111111 8c6110 # black-on-yellow
scrollback-indicator=111111 dcdcdc # black-on-foreground
#search-box-no-match=<regular0> <regular1>  # black-on-red
#search-box-match=<regular0> <regular3>     # black-on-yellow
urls=3a94fb

cursor=000000 d4d4d4
